<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Residuos Rurales</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h1 class="mb-4">Registro de Puntos de Reciclaje</h1>

    <!-- Formulario -->
    <form action="{{ url_for('agregar') }}" method="POST" class="mb-4">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del punto</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
        </div>
        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo de residuo</label>
            <input type="text" class="form-control" id="tipo" name="tipo" required>
        </div>
        <div class="mb-3">
            <label for="ubicacion" class="form-label">Ubicación</label>
            <input type="text" class="form-control" id="ubicacion" name="ubicacion" required>
        </div>
        <button type="submit" class="btn btn-success">Registrar</button>
    </form>

    <!-- Tabla -->
    <h2>Puntos registrados</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Tipo de residuo</th>
                <th>Ubicación</th>
            </tr>
        </thead>
        <tbody>
            {% for punto in puntos %}
            <tr>
                <td>{{ punto.nombre }}</td>
                <td>{{ punto.tipo }}</td>
                <td>{{ punto.ubicacion }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
